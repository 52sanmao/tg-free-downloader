name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.0.0)'
        required: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set version
        id: version
        run: |
          $v = "${{ github.event.inputs.version || github.ref_name }}"
          $v = $v -replace '^v', ''
          echo "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - run: npm install

      - run: npx vite build
        env:
          VITE_API_ID: ${{ secrets.TG_API_ID }}
          VITE_API_HASH: ${{ secrets.TG_API_HASH }}

      - name: Build Electron
        run: npx electron-builder --win --publish never --config.extraMetadata.version=${{ env.APP_VERSION }}
        env:
          VITE_API_ID: ${{ secrets.TG_API_ID }}
          VITE_API_HASH: ${{ secrets.TG_API_HASH }}

      - uses: actions/upload-artifact@v4
        with:
          name: tg-free-downloader-windows
          path: release/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set version
        id: version
        run: echo "APP_VERSION=$(echo '${{ github.event.inputs.version || github.ref_name }}' | sed 's/^v//')" >> $GITHUB_ENV

      - run: npm install

      - run: npx vite build
        env:
          VITE_API_ID: ${{ secrets.TG_API_ID }}
          VITE_API_HASH: ${{ secrets.TG_API_HASH }}

      - name: Build Electron
        run: npx electron-builder --mac --publish never --config.extraMetadata.version=${{ env.APP_VERSION }}
        env:
          VITE_API_ID: ${{ secrets.TG_API_ID }}
          VITE_API_HASH: ${{ secrets.TG_API_HASH }}

      - uses: actions/upload-artifact@v4
        with:
          name: tg-free-downloader-macos
          path: release/
